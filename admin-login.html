<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){ const t=localStorage.getItem('theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — EventPay</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;box-shadow:var(--card-shadow)}
.auth-logo{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}
.auth-sub{text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:24px}
.tabs{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:20px}
.tab-btn{flex:1;padding:9px;border:none;background:none;border-radius:9px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}
.auth-form{display:none}
.auth-form.active{display:block}
.otp-inputs{display:flex;gap:8px;justify-content:center;margin:14px 0}
.otp-box{width:42px;height:50px;text-align:center;font-size:20px;font-weight:700;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text)}
.otp-box:focus{border-color:var(--accent);outline:none}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:6px}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.link-btn{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;font-family:'Sora',sans-serif;font-weight:600}
.msg-box{padding:10px 12px;border-radius:10px;font-size:12px;margin-bottom:12px;display:none}
.msg-box.show{display:block}
.msg-box.error{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.msg-box.success{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.msg-box.info{background:rgba(59,130,246,.12);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.scope-note{font-size:11px;color:var(--text-dim);text-align:center;margin-top:14px}
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">🔐 EventPay Admin</div>
  <div class="auth-sub">Manage your event — login or request access</div>

  <div class="tabs">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div id="msg" class="msg-box"></div>

  <!-- LOGIN -->
  <div class="auth-form active" id="loginForm">
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Event Code (leave blank for platform admin)</label>
      <input class="form-input" id="loginEventCode" placeholder="e.g. WED25001" style="text-transform:uppercase">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Username</label>
      <input class="form-input" id="loginUser" placeholder="Username">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Password</label>
      <input class="form-input" id="loginPass" type="password" placeholder="Password">
    </div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">Log In</button>
    <div class="scope-note">Event admins/organizers log in with their Event Code. Platform admins leave it blank.</div>
  </div>

  <!-- SIGNUP STEP 1 -->
  <div class="auth-form" id="signupForm">
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Event Code *</label>
      <input class="form-input" id="suEventCode" placeholder="e.g. WED25001" style="text-transform:uppercase">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Choose a Username *</label>
      <input class="form-input" id="suUser" placeholder="At least 3 characters">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Choose a Password *</label>
      <input class="form-input" id="suPass" type="password" placeholder="At least 6 characters">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Email Address * (OTP will be sent here)</label>
      <input class="form-input" id="suEmail" type="email" placeholder="you@example.com">
    </div>
    <button class="submit-btn" id="suBtn" onclick="requestSignup()">Send Verification Code</button>
    <div class="scope-note">You'll get <strong>Viewer</strong> access for this event — view-only, cannot edit payments or settings.</div>
  </div>

  <!-- SIGNUP STEP 2: OTP -->
  <div class="auth-form" id="otpForm">
    <p style="font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:6px">Enter the 6-digit code sent to</p>
    <p style="font-size:13px;font-weight:700;text-align:center;margin-bottom:16px" id="otpEmailDisplay">—</p>
    <div class="otp-inputs">
      <input class="otp-box" maxlength="1" inputmode="numeric">
      <input class="otp-box" maxlength="1" inputmode="numeric">
      <input class="otp-box" maxlength="1" inputmode="numeric">
      <input class="otp-box" maxlength="1" inputmode="numeric">
      <input class="otp-box" maxlength="1" inputmode="numeric">
      <input class="otp-box" maxlength="1" inputmode="numeric">
    </div>
    <button class="submit-btn" id="otpBtn" onclick="verifyOTP()">Verify &amp; Create Account</button>
    <div style="text-align:center;margin-top:12px">
      <button class="link-btn" onclick="resendOTP()">Resend code</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
let pendingSignup = {};

function switchTab(tab){
  document.getElementById("tabLogin").classList.toggle("active", tab==="login");
  document.getElementById("tabSignup").classList.toggle("active", tab==="signup");
  document.getElementById("loginForm").classList.toggle("active", tab==="login");
  document.getElementById("signupForm").classList.toggle("active", tab==="signup");
  document.getElementById("otpForm").classList.remove("active");
  hideMsg();
}

function showMsg(type, text){
  const el = document.getElementById("msg");
  el.className = "msg-box show " + type;
  el.textContent = text;
}
function hideMsg(){ document.getElementById("msg").classList.remove("show"); }

function setBusy(btnId, busy, label){
  const b = document.getElementById(btnId);
  b.disabled = busy;
  if (label) b.textContent = label;
}

// ── LOGIN ──
function doLogin(){
  const eventCode = document.getElementById("loginEventCode").value.trim().toUpperCase();
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value.trim();
  if (!username || !password) { showMsg("error","Enter username and password"); return; }

  setBusy("loginBtn", true, "Logging in...");
  const params = new URLSearchParams({ action:"loginAdmin", username, password, eventCode });
  fetch(APP_CONFIG.SCRIPT_URL, { method:"POST", body: params })
    .then(r=>r.json()).then(res=>{
      setBusy("loginBtn", false, "Log In");
      if (res.success){
        localStorage.setItem("ep_admin_token", res.token);
        localStorage.setItem("ep_admin_expiry", res.expiry);
        localStorage.setItem("ep_admin_user", username);
        localStorage.setItem("ep_admin_role", res.role);
        localStorage.setItem("ep_admin_access", res.accessLevel);
        localStorage.setItem("ep_admin_scope", res.scope || "global");
        if (eventCode) localStorage.setItem("ep_admin_event", eventCode);
        window.location.href = "admin.html";
      } else {
        showMsg("error", res.error || "Login failed");
      }
    })
    .catch(()=>{ setBusy("loginBtn", false, "Log In"); showMsg("error","Connection error"); });
}

// ── SIGNUP STEP 1: request OTP ──
function requestSignup(){
  const eventCode = document.getElementById("suEventCode").value.trim().toUpperCase();
  const username = document.getElementById("suUser").value.trim();
  const password = document.getElementById("suPass").value.trim();
  const email = document.getElementById("suEmail").value.trim();

  if (!eventCode) { showMsg("error","Enter the Event Code"); return; }
  if (username.length < 3) { showMsg("error","Username must be at least 3 characters"); return; }
  if (password.length < 6) { showMsg("error","Password must be at least 6 characters"); return; }
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { showMsg("error","Enter a valid email"); return; }

  setBusy("suBtn", true, "Sending code...");
  const params = new URLSearchParams({ action:"requestAdminSignup", eventCode, username, password, email });
  fetch(APP_CONFIG.SCRIPT_URL, { method:"POST", body: params })
    .then(r=>r.json()).then(res=>{
      setBusy("suBtn", false, "Send Verification Code");
      if (res.success){
        pendingSignup = { eventCode, email };
        document.getElementById("otpEmailDisplay").textContent = email;
        document.getElementById("signupForm").classList.remove("active");
        document.getElementById("otpForm").classList.add("active");
        hideMsg();
        setupOtpBoxes();
      } else {
        showMsg("error", res.error || "Could not send OTP");
      }
    })
    .catch(()=>{ setBusy("suBtn", false, "Send Verification Code"); showMsg("error","Connection error"); });
}

function setupOtpBoxes(){
  const boxes = document.querySelectorAll(".otp-box");
  boxes.forEach((box,i)=>{
    box.value = "";
    box.oninput = () => { box.value = box.value.replace(/\D/g,""); if (box.value && boxes[i+1]) boxes[i+1].focus(); };
    box.onkeydown = (e) => { if (e.key==="Backspace" && !box.value && boxes[i-1]) boxes[i-1].focus(); };
  });
  boxes[0].focus();
}

function verifyOTP(){
  const boxes = document.querySelectorAll(".otp-box");
  const otp = Array.from(boxes).map(b=>b.value).join("");
  if (otp.length !== 6) { showMsg("error","Enter all 6 digits"); return; }

  setBusy("otpBtn", true, "Verifying...");
  const params = new URLSearchParams({ action:"verifyAdminSignupOTP", eventCode: pendingSignup.eventCode, email: pendingSignup.email, otp });
  fetch(APP_CONFIG.SCRIPT_URL, { method:"POST", body: params })
    .then(r=>r.json()).then(res=>{
      setBusy("otpBtn", false, "Verify & Create Account");
      if (res.success){
        showMsg("success", "Account created! You can now log in.");
        setTimeout(()=>{ switchTab("login"); document.getElementById("loginEventCode").value = pendingSignup.eventCode; }, 1200);
      } else {
        showMsg("error", res.error || "Verification failed");
      }
    })
    .catch(()=>{ setBusy("otpBtn", false, "Verify & Create Account"); showMsg("error","Connection error"); });
}

function resendOTP(){
  hideMsg();
  const params = new URLSearchParams({ action:"resendAdminOTP", eventCode: pendingSignup.eventCode, email: pendingSignup.email });
  fetch(APP_CONFIG.SCRIPT_URL, { method:"POST", body: params })
    .then(r=>r.json()).then(res=>{
      if (res.success) showMsg("info", "A new code has been sent.");
      else showMsg("error", res.error || "Could not resend code");
    });
}
</script>
</body>
</html>
