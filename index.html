<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventPay — Find your event</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="lights" aria-hidden="true">
    <svg viewBox="0 0 800 64" preserveAspectRatio="none">
      <path d="M0,8 C 100,50 200,50 300,8 S 500,50 600,8 S 800,50 800,8"
            fill="none" stroke="#cda355" stroke-opacity="0.35" stroke-width="1.5"/>
      <g fill="#e6c580">
        <circle class="bulb" cx="30"  cy="14" r="3.5"/>
        <circle class="bulb" cx="90"  cy="30" r="3.5"/>
        <circle class="bulb" cx="150" cy="38" r="3.5"/>
        <circle class="bulb" cx="210" cy="30" r="3.5"/>
        <circle class="bulb" cx="270" cy="14" r="3.5"/>
        <circle class="bulb" cx="330" cy="14" r="3.5"/>
        <circle class="bulb" cx="390" cy="30" r="3.5"/>
        <circle class="bulb" cx="450" cy="38" r="3.5"/>
        <circle class="bulb" cx="510" cy="30" r="3.5"/>
        <circle class="bulb" cx="570" cy="14" r="3.5"/>
        <circle class="bulb" cx="630" cy="14" r="3.5"/>
        <circle class="bulb" cx="690" cy="30" r="3.5"/>
        <circle class="bulb" cx="750" cy="38" r="3.5"/>
      </g>
    </svg>
  </div>

  <main class="page">
    <p class="brand">EventPay</p>
    <h1 class="hero-title">Find your event</h1>
    <p class="hero-sub">Enter the code or the name from your invitation to open the celebration.</p>

    <section class="card">
      <div class="tabs" role="tablist">
        <button type="button" id="tabCode" class="tab" role="tab">Event Code</button>
        <button type="button" id="tabName" class="tab" role="tab">Event Name</button>
      </div>

      <form id="searchForm" novalidate>
        <div class="field">
          <label for="searchInput" id="searchLabel">Wedding code</label>
          <input type="text" id="searchInput" autocomplete="off" required>
        </div>
        <button type="submit" id="openEventBtn" class="btn-primary">Open Event</button>
      </form>

      <ul id="resultsList" class="results" hidden></ul>
    </section>

    <p class="footnote">Don't have your invitation handy? Ask your host for the event code.</p>
  </main>

  <div id="toastContainer" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/event.js"></script>
</body>
</html>
