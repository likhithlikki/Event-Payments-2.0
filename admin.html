<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · EventPay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="lights" aria-hidden="true">
    <svg viewBox="0 0 800 64" preserveAspectRatio="none">
      <path d="M0,8 C 100,50 200,50 300,8 S 500,50 600,8 S 800,50 800,8"
            fill="none" stroke="#cda355" stroke-opacity="0.35" stroke-width="1.5"/>
      <g fill="#e6c580">
        <circle class="bulb" cx="30"  cy="14" r="3.5"/>
        <circle class="bulb" cx="90"  cy="30" r="3.5"/>
        <circle class="bulb" cx="150" cy="38" r="3.5"/>
        <circle class="bulb" cx="210" cy="30" r="3.5"/>
        <circle class="bulb" cx="270" cy="14" r="3.5"/>
        <circle class="bulb" cx="330" cy="14" r="3.5"/>
        <circle class="bulb" cx="390" cy="30" r="3.5"/>
        <circle class="bulb" cx="450" cy="38" r="3.5"/>
        <circle class="bulb" cx="510" cy="30" r="3.5"/>
        <circle class="bulb" cx="570" cy="14" r="3.5"/>
        <circle class="bulb" cx="630" cy="14" r="3.5"/>
        <circle class="bulb" cx="690" cy="30" r="3.5"/>
        <circle class="bulb" cx="750" cy="38" r="3.5"/>
      </g>
    </svg>
  </div>

  <nav class="topnav">
    <span class="topnav__brand">EventPay</span>
    <div class="topnav__links" id="topnavLinks"></div>
  </nav>

  <main class="admin-page">

    <!-- Login -->
    <section class="card contribute-card" id="adminLoginCard" style="max-width:380px;margin:20px auto;">
      <p class="contribute-card__label">Organizer login</p>
      <form id="adminLoginForm" novalidate>
        <div class="field">
          <label for="adminUsername">Username</label>
          <input type="text" id="adminUsername" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" autocomplete="current-password" required>
        </div>
        <button type="submit" id="adminLoginBtn" class="btn-primary">Log in</button>
      </form>
    </section>

    <!-- Dashboard -->
    <section id="adminDashboard" hidden>
      <div class="admin-topbar">
        <span id="adminWelcome"></span>
        <button type="button" class="btn-secondary" id="adminLogoutBtn">Log out</button>
      </div>

      <div class="admin-tabs" id="adminTabs">
        <button type="button" class="admin-tab is-active" data-tab="complaints">Complaints</button>
        <button type="button" class="admin-tab" data-tab="gallery">Gallery</button>
        <button type="button" class="admin-tab" data-tab="villages">Villages</button>
        <button type="button" class="admin-tab" data-tab="settings">Settings</button>
        <button type="button" class="admin-tab" data-tab="analytics">Analytics</button>
        <button type="button" class="admin-tab" data-tab="payments">Payments</button>
      </div>

      <div class="admin-panel" id="panel-complaints"></div>
      <div class="admin-panel" id="panel-gallery" hidden></div>
      <div class="admin-panel" id="panel-villages" hidden></div>
      <div class="admin-panel" id="panel-settings" hidden></div>
      <div class="admin-panel" id="panel-analytics" hidden></div>
      <div class="admin-panel" id="panel-payments" hidden></div>
    </section>
  </main>

  <div id="toastContainer" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
