<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Admin dashboard for event management.">
<title>Admin · EventPay</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .admin-page { padding: 20px 16px; max-width: 900px; margin: 0 auto; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .admin-header__info { display: flex; flex-direction: column; gap: 4px; }
  #adminWelcome { font-weight: 600; }
  #sessionClock { font-size: 12px; color: var(--text-muted, #888); }
  .admin-tabs { display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border, #333); padding-bottom: 12px; margin-bottom: 20px; }
  .admin-tab { padding: 8px 16px; border-radius: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted, #999); transition: all 0.2s; }
  .admin-tab:hover { background: rgba(255,255,255,0.06); color: var(--text, #fff); }
  .admin-tab.is-active { background: var(--primary, #cda355); color: #fff; border-color: var(--primary, #cda355); }
  .admin-panel { display: none; }
  .admin-panel:not([hidden]) { display: block; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface, #1a1a2e); border: 1px solid var(--border, #333); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-card__value { font-size: 22px; font-weight: 700; color: var(--primary, #cda355); }
  .stat-card__label { font-size: 11px; color: var(--text-muted, #888); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .admin-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 1px solid var(--border, #333); border-radius: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .admin-row__main { flex: 1; min-width: 200px; }
  .admin-row__actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .admin-table th, .admin-table td { padding: 10px 12px; border-bottom: 1px solid var(--border, #333); text-align: left; }
  .admin-table th { font-weight: 600; color: var(--text-muted, #888); font-size: 11px; text-transform: uppercase; }
  .reply-input, .status-select { padding: 8px; border-radius: 8px; border: 1px solid var(--border, #333); background: var(--input-bg, #111); color: var(--text, #fff); font-size: 13px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .gallery-tile { border: 1px solid var(--border, #333); border-radius: 10px; overflow: hidden; }
  .gallery-tile img { width: 100%; aspect-ratio: 1; object-fit: cover; }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(205,163,85,0.15); color: var(--primary, #cda355); }
  .status-badge--open { background: rgba(239,68,68,0.15); color: #f87171; }
  .status-badge--in-progress { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .status-badge--resolved { background: rgba(16,185,129,0.15); color: #34d399; }
  .theme-swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .theme-swatch { border: 2px solid var(--border, #333); border-radius: 10px; padding: 8px; cursor: pointer; background: var(--surface, #1a1a2e); text-align: center; transition: all 0.2s; }
  .theme-swatch.is-selected { border-color: var(--primary, #cda355); }
  .theme-swatch__preview { height: 40px; border-radius: 6px; margin-bottom: 6px; }
  .theme-swatch__name { font-size: 11px; font-weight: 600; }
  .settings-section { margin-bottom: 24px; }
  .skeleton { color: var(--text-muted, #888); padding: 20px 0; }
  .btn-primary { padding: 10px 20px; background: var(--primary, #cda355); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { padding: 8px 14px; background: transparent; color: var(--text, #fff); border: 1px solid var(--border, #333); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .btn-secondary:hover { background: rgba(255,255,255,0.06); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted, #888); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 12px; background: var(--input-bg, #111); border: 1px solid var(--border, #333); border-radius: 8px; color: var(--text, #fff); font-size: 14px; box-sizing: border-box; }
  .feature-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .feature-card { background: var(--surface, #1a1a2e); border: 1px solid var(--border, #333); border-radius: 12px; padding: 16px; }
  .feature-card__label { display: block; font-weight: 600; margin-bottom: 4px; }
  .feature-card__desc { font-size: 18px; font-weight: 700; color: var(--primary, #cda355); }
  .contribute-card__label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted, #888); margin-bottom: 12px; }
</style>
</head>
<body>

  <div class="lights" aria-hidden="true">
    <svg viewBox="0 0 800 64" preserveAspectRatio="none">
      <path d="M0,8 C 100,50 200,50 300,8 S 500,50 600,8 S 800,50 800,8"
            fill="none" stroke="#cda355" stroke-opacity="0.35" stroke-width="1.5"/>
      <g fill="#e6c580">
        <circle class="bulb" cx="30"  cy="14" r="3.5"/>
        <circle class="bulb" cx="90"  cy="30" r="3.5"/>
        <circle class="bulb" cx="150" cy="38" r="3.5"/>
        <circle class="bulb" cx="210" cy="30" r="3.5"/>
        <circle class="bulb" cx="270" cy="14" r="3.5"/>
        <circle class="bulb" cx="330" cy="14" r="3.5"/>
        <circle class="bulb" cx="390" cy="30" r="3.5"/>
        <circle class="bulb" cx="450" cy="38" r="3.5"/>
        <circle class="bulb" cx="510" cy="30" r="3.5"/>
        <circle class="bulb" cx="570" cy="14" r="3.5"/>
        <circle class="bulb" cx="630" cy="14" r="3.5"/>
        <circle class="bulb" cx="690" cy="30" r="3.5"/>
        <circle class="bulb" cx="750" cy="38" r="3.5"/>
      </g>
    </svg>
  </div>

  <header class="topnav">
    <a class="topnav__brand" href="index.html">EventPay</a>
    <nav id="topnavLinks" class="topnav__links"></nav>
  </header>

  <main class="admin-page">
    <div class="admin-header">
      <div class="admin-header__info">
        <span id="adminWelcome">Loading…</span>
        <span id="sessionClock"></span>
      </div>
      <button type="button" id="adminLogoutBtn" class="btn-secondary">Log out</button>
    </div>

    <div class="admin-tabs" role="tablist">
      <button type="button" class="admin-tab" data-tab="dashboard" role="tab">Dashboard</button>
      <button type="button" class="admin-tab" data-tab="payments" role="tab">Payments</button>
      <button type="button" class="admin-tab" data-tab="complaints" role="tab">Complaints</button>
      <button type="button" class="admin-tab" data-tab="gallery" role="tab">Gallery</button>
      <button type="button" class="admin-tab" data-tab="villages" role="tab">Villages</button>
      <button type="button" class="admin-tab" data-tab="analytics" role="tab">Analytics</button>
      <button type="button" class="admin-tab" data-tab="settings" role="tab">Settings</button>
      <button type="button" class="admin-tab" data-tab="admins" role="tab">Admins</button>
      <button type="button" class="admin-tab" data-tab="audit" role="tab">Audit Log</button>
    </div>

    <div id="panel-dashboard" class="admin-panel"></div>
    <div id="panel-payments" class="admin-panel" hidden></div>
    <div id="panel-complaints" class="admin-panel" hidden></div>
    <div id="panel-gallery" class="admin-panel" hidden></div>
    <div id="panel-villages" class="admin-panel" hidden></div>
    <div id="panel-analytics" class="admin-panel" hidden></div>
    <div id="panel-settings" class="admin-panel" hidden></div>
    <div id="panel-admins" class="admin-panel" hidden></div>
    <div id="panel-audit" class="admin-panel" hidden></div>
  </main>

  <div id="toastContainer" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
